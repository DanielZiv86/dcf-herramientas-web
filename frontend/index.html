<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DCF Inversiones | Herramientas de Análisis</title>
  <meta name="description" content="Herramientas de análisis de mercado financiero — DCF Inversiones"/>
  <link rel="icon" href="assets/dcf-logo.png"/>
  <link rel="stylesheet" href="css/design-system.css"/>
  <link rel="stylesheet" href="css/components.css"/>
  <link rel="stylesheet" href="css/pages.css"/>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>
<div class="app-shell">

  <!-- ── Top Navigation ───────────────────────────────────────────────────── -->
  <header class="topnav">
    <div class="topnav-logo">
      <img src="assets/dcf-logo.png" alt="DCF" onerror="this.style.display='none'" style="height:32px"/>
      <span class="topnav-logo-text">DCF Inversiones</span>
    </div>

    <nav class="topnav-links" id="topnav-links">
      <!-- Built by app.js -->
    </nav>

    <div class="topnav-right">
      <div id="market-status-badge" class="market-badge">
        <span id="market-dot" class="market-dot closed"></span>
        <span id="market-status-text" class="market-status-text">—</span>
      </div>
      <span id="topbar-timestamp" class="topbar-ts" title="Última actualización"></span>
      <span class="topnav-user" id="topbar-user"></span>
      <button class="topnav-logout" id="logout-btn">Salir →</button>
    </div>
  </header>

  <!-- ── Main content ──────────────────────────────────────────────────────── -->
  <main class="main-content">
    <div id="page-content"></div>
  </main>

</div>

<script src="js/api.js"></script>
<script src="js/charts.js"></script>
<script src="js/components.js"></script>
<script src="js/pages/dashboard.js"></script>
<script src="js/pages/bonos.js"></script>
<script src="js/pages/letras.js"></script>
<script src="js/pages/cer.js"></script>
<script src="js/pages/ons.js"></script>
<script src="js/pages/fci.js"></script>
<script src="js/pages/fundamental.js"></script>
<script src="js/app.js"></script>
</body>
</html>
