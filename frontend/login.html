<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DCF | Ingresar</title>
  <link rel="icon" href="assets/dcf-logo.png"/>
  <link rel="stylesheet" href="css/design-system.css"/>
  <link rel="stylesheet" href="css/components.css"/>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <img src="assets/dcf-logo.png" alt="DCF Inversiones" onerror="this.outerHTML='<div style=\'font-size:2rem;font-weight:900;color:#f97316\'>DCF</div>'"/>
    </div>
    <h1 class="login-title">DCF Inversiones</h1>
    <p class="login-subtitle">Herramientas de análisis de mercado</p>

    <a id="google-login-btn" class="login-btn-google" style="cursor:pointer">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.8 2.5 30.2 0 24 0 14.7 0 6.8 5.4 3 13.4l7.8 6C12.8 13 17.9 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.1 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.4c-.5 2.9-2.1 5.3-4.5 7l7 5.4c4.1-3.8 6.5-9.4 6.5-16z"/>
        <path fill="#FBBC05" d="M10.8 28.6A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.1.8-4.6L2.6 13.4A23.9 23.9 0 0 0 0 24c0 3.8.9 7.4 2.5 10.6l8.3-6z"/>
        <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7-5.4c-2 1.4-4.6 2.2-8.2 2.2-6.1 0-11.2-3.5-13.2-8.8l-8.3 6C6.8 42.6 14.7 48 24 48z"/>
      </svg>
      Ingresar con Google
    </a>

    <div id="login-error" class="login-error hidden"></div>
  </div>
</div>

<script>
  // Detect base paths
  const _API = (
    window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ) ? '' : (window._DCF_API_URL || 'https://dcf-herramientas-web.onrender.com');

  const _base = (() => {
    const p = window.location.pathname;
    const m = p.match(/^(\/[^/]+)\//);
    return (m && !m[1].includes('.')) ? m[1] : '';
  })();

  // Check for error in URL params
  const params = new URLSearchParams(window.location.search);
  const error = params.get('error');
  const errorMessages = {
    oauth_denied:    'Acceso denegado por Google.',
    token_failed:    'Error al obtener el token de acceso.',
    userinfo_failed: 'No se pudo obtener la información del usuario.',
    no_email:        'No se recibió un email válido.',
    not_authorized:  'Tu email no está en la lista de acceso. Contactá a DCF Inversiones.',
  };
  if (error) {
    const el = document.getElementById('login-error');
    el.classList.remove('hidden');
    el.textContent = errorMessages[error] || `Error: ${error}`;
  }

  // Set Google login button href dynamically to point to Render backend
  document.getElementById('google-login-btn').href = _API + '/auth/login';

  // If already logged in, redirect to app
  fetch(_API + '/auth/me', { credentials: 'include' })
    .then(r => { if (r.ok) window.location.href = _base + '/'; })
    .catch(() => {});
</script>
</body>
</html>
