services:
  - type: web
    name: dcf-herramientas-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT --app-dir backend
    envVars:
      - key: DEV_BYPASS_AUTH
        value: "true"
      - key: DEBUG
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: FINNHUB_TOKEN
        sync: false
      - key: STREAMLIT_DATA_PATH
        value: ""
      - key: ALLOWED_ORIGINS
        value: "https://danielziv86.github.io,https://dcf-herramientas-web.onrender.com,https://app.dcfinversiones.com"
