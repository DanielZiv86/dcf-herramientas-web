name: Actualizar Universo Símbolos USA

# Corre el 1° de cada mes a las 09:00 UTC (06:00 ART).
# Llama a Finnhub /stock/symbol?exchange=US y regenera us_symbols_search.json.
# Solo commitea si el archivo cambia (tickers nuevos o delists).

on:
  schedule:
    - cron: '0 9 1 * *'   # 09:00 UTC cada día 1 = 06:00 ART
  workflow_dispatch:        # permite disparar manualmente desde GitHub UI

permissions:
  contents: write

jobs:
  update-symbols:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Instalar dependencias
        run: pip install httpx

      - name: Actualizar us_symbols_search.json
        run: python scripts/update_finnhub_us_symbols.py
        env:
          FINNHUB_TOKEN: ${{ secrets.FINNHUB_TOKEN }}

      - name: Verificar si cambió
        id: check
        run: |
          git diff --quiet backend/data/fundamental/us_symbols_search.json \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commitear JSON actualizado
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/data/fundamental/us_symbols_search.json
          git commit -m "auto: actualizar BD símbolos USA [$(date -u '+%Y-%m-%d')]"
          git pull --rebase origin main
          git push

      - name: Log si no hubo cambios
        if: steps.check.outputs.changed == 'false'
        run: echo "us_symbols_search.json sin cambios este mes."
