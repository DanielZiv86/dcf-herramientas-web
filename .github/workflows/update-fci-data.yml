name: Actualizar FCI Data

# Corre cada semana el lunes a las 08:00 ART (11:00 UTC).
# Llama a la API de CAFCI desde GitHub Actions (con DNS público) y
# regenera fci_data.json. Al commitear, Render redeploya automáticamente.

on:
  schedule:
    - cron: '0 11 * * 1'   # 11:00 UTC lunes = 08:00 ART
  workflow_dispatch:         # permite disparar manualmente desde GitHub UI

permissions:
  contents: write

jobs:
  rebuild-fci-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Instalar dependencias
        run: |
          pip install requests pandas dnspython

      - name: Regenerar fci_data.json via CAFCI API
        id: build
        run: |
          python backend/build_fci_data_ci.py
        env:
          PYTHONPATH: backend
        # Si CAFCI bloquea el datacenter IP el script hace exit(1) y
        # este step falla — los steps siguientes no corren, preservando
        # el fci_data.json existente (que fue generado localmente).
        continue-on-error: false

      - name: Verificar si cambió
        id: check
        if: steps.build.outcome == 'success'
        run: |
          git diff --quiet backend/data/fci_data.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commitear JSON actualizado
        if: steps.build.outcome == 'success' && steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/data/fci_data.json
          git commit -m "auto: actualizar fci_data.json [$(date -u '+%Y-%m-%d')]"
          git pull --rebase origin main
          git push

      - name: Log si no hubo cambios
        if: steps.build.outcome == 'success' && steps.check.outputs.changed == 'false'
        run: echo "fci_data.json sin cambios."

      - name: Log si CAFCI bloqueó el acceso
        if: steps.build.outcome == 'failure'
        run: |
          echo "⚠️  CAFCI API bloqueó el acceso desde GitHub Actions (403)."
          echo "    fci_data.json NO fue modificado. Regenerar manualmente con:"
          echo "    python backend/build_fci_data.py  (desde máquina local)"
